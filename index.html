<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Karatela — Descendants of Didher Khatri</title>
<style>
  :root{
    --paper:#ECE6D8; --paper-2:#F4EFE4; --panel:#F7F3EA;
    --ink:#2B2622; --ink-soft:#6E6353; --hair:#CDC2A8;
    --brass:#A8762B; --maroon:#8A2E2A; --green:#3F6B4E; --line:#C0B49A; --line-hi:#A8762B;
    --male:#C8402F; --female:#2F7D4E; --unknown:#2E5E8C;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--paper);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}
  header{flex:0 0 auto;padding:14px 20px 12px;border-bottom:1px solid var(--hair);
    background:linear-gradient(180deg,var(--paper-2),var(--paper));position:relative;z-index:5}
  .titrow{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  h1{font-family:var(--serif);font-weight:600;font-size:25px;letter-spacing:.02em;margin:0}
  h1 .k{color:var(--brass)}
  .sub{font-size:12.5px;color:var(--ink-soft);letter-spacing:.04em;text-transform:uppercase}
  .ver{font-size:11px;color:var(--ink-soft);border:1px solid var(--hair);border-radius:999px;padding:2px 9px;letter-spacing:.04em;font-variant-numeric:tabular-nums}
  .meta{margin-left:auto;font-size:12px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .meta b{color:var(--ink);font-weight:600}
  .controls{display:flex;gap:10px;align-items:center;margin-top:11px;flex-wrap:wrap}
  .searchwrap{position:relative;flex:1 1 280px;max-width:420px}
  #q{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--hair);border-radius:8px;
    background:var(--paper-2);font-family:var(--sans);font-size:14px;color:var(--ink)}
  #q:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(168,118,43,.15)}
  .searchwrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--ink-soft);fill:none;stroke-width:2}
  #results{position:absolute;top:42px;left:0;right:0;max-height:340px;overflow:auto;background:var(--paper-2);
    border:1px solid var(--hair);border-radius:8px;box-shadow:0 10px 30px rgba(43,38,34,.16);display:none;z-index:20}
  #results.show{display:block}
  .res{padding:8px 12px;border-bottom:1px solid var(--hair);cursor:pointer;font-size:13.5px}
  .res:last-child{border-bottom:none}.res:hover{background:var(--paper)}
  .res .nm{font-weight:600}.res .dt{color:var(--ink-soft);font-size:11.5px;font-variant-numeric:tabular-nums}
  .res .gen{float:right;color:var(--brass);font-size:11px}.res .empty{color:var(--ink-soft)}
  .btn{padding:8px 12px;border:1px solid var(--hair);background:var(--paper-2);border-radius:8px;font-size:13px;color:var(--ink);cursor:pointer;white-space:nowrap}
  .btn:hover{border-color:var(--brass);color:var(--brass)}
  .btn.primary{background:var(--brass);color:#fff;border-color:var(--brass)}
  .btn.primary:hover{background:#946523;color:#fff}
  .btn.danger:hover{border-color:var(--maroon);color:var(--maroon)}
  .zoomgrp{display:flex;border:1px solid var(--hair);border-radius:8px;overflow:hidden;background:var(--paper-2)}
  .zoomgrp button{border:none;background:none;padding:8px 12px;cursor:pointer;font-size:15px;color:var(--ink)}
  .zoomgrp button:hover{background:var(--paper);color:var(--brass)}.zoomgrp .div{width:1px;background:var(--hair)}
  .authbar{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-soft)}
  .authbar .ok{color:var(--green);font-weight:600}.authbar .warn{color:var(--maroon)}
  main{flex:1 1 auto;display:flex;min-height:0}
  #canvas{flex:1 1 auto;overflow:auto;position:relative;cursor:grab;background:
    radial-gradient(circle at 1px 1px, rgba(120,108,88,.10) 1px, transparent 0) 0 0/22px 22px,var(--paper)}
  #canvas.grabbing{cursor:grabbing}#canvas svg{display:block}
  text{font-family:var(--sans)}
  .edge{fill:none;stroke:var(--line);stroke-width:1.1}.edge.hi{stroke:var(--line-hi);stroke-width:2}
  .gline{stroke:var(--hair);stroke-width:1;stroke-dasharray:2 6;opacity:.7}
  .gnum{fill:var(--ink-soft);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  .node{cursor:pointer}.node .mk{stroke-width:1.4}
  .node .lbl{font-size:12.5px;fill:var(--ink);dominant-baseline:middle}
  .node .yr{font-size:10.5px;fill:var(--ink-soft);dominant-baseline:middle;font-variant-numeric:tabular-nums}
  .node .badge{font-size:10px;fill:var(--brass);dominant-baseline:middle;font-weight:600}
  .node.sel .lbl{fill:var(--maroon);font-weight:700}.node.flash .mk{stroke:var(--maroon)!important}
  .toggle{cursor:pointer}
  aside{flex:0 0 322px;border-left:1px solid var(--hair);background:var(--panel);overflow:auto;padding:0;position:relative}
  aside.hidden{margin-right:-323px}
  .pad{padding:18px 20px 28px}
  .ph{font-family:var(--serif);font-size:21px;line-height:1.2;margin:0 0 2px}
  .pmk{display:inline-block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:14px}
  .pmk .sx{color:var(--brass)}
  .editrow{display:flex;gap:8px;margin:0 0 16px;flex-wrap:wrap}
  .facts{border-top:1px solid var(--hair)}
  .fact{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--hair);font-size:13px}
  .fact .l{color:var(--ink-soft)}.fact .v{text-align:right;font-variant-numeric:tabular-nums}
  .sech{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--brass);margin:18px 0 8px}
  .chain{display:flex;flex-wrap:wrap;gap:0 2px;font-size:12.5px;line-height:1.9}
  .chain a{color:var(--ink);cursor:pointer;text-decoration:none;border-bottom:1px dotted var(--hair)}
  .chain a:hover{color:var(--brass)}.chain .sep{color:var(--hair)}
  .chain .cur{color:var(--maroon);font-weight:700;border:none}
  .kids{display:flex;flex-direction:column;gap:1px}
  .kid{padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;gap:8px}
  .kid:hover{background:var(--paper)}.kid .kc{color:var(--brass);font-size:11px}
  .closep{position:absolute;top:10px;right:12px;cursor:pointer;color:var(--ink-soft);font-size:20px;line-height:1;border:none;background:none}
  .closep:hover{color:var(--maroon)}
  .emptystate{padding:40px 22px;color:var(--ink-soft);font-size:13.5px;line-height:1.6}
  .legend{position:absolute;left:14px;bottom:12px;background:rgba(247,243,234,.92);border:1px solid var(--hair);border-radius:8px;padding:8px 11px;font-size:11.5px;color:var(--ink-soft);display:flex;gap:14px;align-items:center;backdrop-filter:blur(2px)}
  .legend i{width:9px;height:9px;display:inline-block;border-radius:50%;margin-right:5px;vertical-align:middle}
  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(43,38,34,.42);display:none;align-items:center;justify-content:center;z-index:50}
  .scrim.show{display:flex}
  .modal{background:var(--paper-2);border:1px solid var(--hair);border-radius:12px;width:min(460px,92vw);max-height:90vh;overflow:auto;box-shadow:0 24px 60px rgba(43,38,34,.3)}
  .mhead{font-family:var(--serif);font-size:19px;padding:16px 20px 0}
  .mbody{padding:14px 20px 6px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--hair);border-radius:7px;background:var(--paper);font-family:var(--sans);font-size:14px;color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(168,118,43,.15)}
  .field textarea{resize:vertical;min-height:54px}
  .row2{display:flex;gap:10px}.row2 .field{flex:1}
  .parentpick{position:relative}
  .ppres{position:absolute;left:0;right:0;top:38px;background:var(--paper-2);border:1px solid var(--hair);border-radius:7px;max-height:180px;overflow:auto;display:none;z-index:5}
  .ppres.show{display:block}.ppres div{padding:7px 10px;cursor:pointer;font-size:13px}.ppres div:hover{background:var(--paper)}
  .mfoot{display:flex;justify-content:space-between;gap:10px;padding:12px 20px 18px;align-items:center}
  .mfoot .right{display:flex;gap:8px;margin-left:auto}
  .hint{font-size:11.5px;color:var(--ink-soft);padding:0 20px 14px;line-height:1.5}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 16px;border-radius:8px;font-size:13px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .banner{background:#f6ecd2;border-bottom:1px solid var(--hair);padding:8px 20px;font-size:12.5px;color:var(--ink-soft)}
  .banner b{color:var(--brass)}
  @media (max-width:760px){ aside{position:absolute;right:0;top:0;bottom:0;z-index:30;box-shadow:-8px 0 24px rgba(0,0,0,.12)} aside.hidden{margin-right:-100%} .meta{display:none} }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="titrow">
      <h1><span class="k">Karatela</span> &nbsp;·&nbsp; Descendants of Didher Khatri</h1>
      <span class="sub">A patrilineal register</span>
      <span class="ver" id="appVer"></span>
      <span class="meta"><b id="cTot">0</b> individuals &nbsp;·&nbsp; <b id="cGen">19</b> generations &nbsp;·&nbsp; 1678 → present</span>
    </div>
    <div class="controls">
      <div class="searchwrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        <input id="q" type="text" placeholder="Search a name or ref #…" autocomplete="off" spellcheck="false">
        <div id="results"></div>
      </div>
      <button class="btn" id="bExpand">Expand all</button>
      <button class="btn" id="bCollapse">Collapse</button>
      <button class="btn" id="bFit">Fit</button>
      <div class="zoomgrp"><button id="zOut" title="Zoom out">−</button><div class="div"></div><button id="zIn" title="Zoom in">+</button></div>
      <button class="btn" id="bPdfAll">Export PDF</button>
      <div class="authbar" id="authbar"></div>
    </div>
  </header>
  <div class="banner" id="banner" style="display:none"></div>
  <main>
    <div id="canvas"><svg id="svg"></svg>
      <div class="legend">
        <span><i style="background:var(--male)"></i>male</span>
        <span><i style="background:var(--female)"></i>female</span>
        <span><i style="background:var(--unknown)"></i>unknown</span>
        <span>tap a marker to expand · tap a name for details</span>
      </div>
    </div>
    <aside id="panel" class="hidden"><div class="emptystate">Select a person to see their dates, lineage chain, and children.</div></aside>
  </main>
</div>
<input type="file" id="restoreFile" accept="application/json,.json" style="display:none">
<div class="scrim" id="scrim"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script type="module">

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCzmMgFSOaJchj7utLMgQVqABlCAUjKRuQ",
  authDomain:        "karatela-family-tree.firebaseapp.com",
  projectId:         "karatela-family-tree",
  appId:             "1:920503408451:web:8df7c4640a74955b2a41f6"
};
const FBVER = "10.12.2";

/* ---------- state ---------- */
let nodes=[], byId=new Map(), kids=new Map(), depth=new Map(), ROOT=null;
let expanded=new Set(), selected=null, scale=1, firstLoad=true;
let MODE='demo', db=null, auth=null, user=null, isEditor=false, FB=null;
const COLX=274, ROWH=26, PADX=34, PADY=34, MK=4.2, LBLDX=12, MAXLBLW=208;
const SEXCOL={Male:'var(--male)',Female:'var(--female)',Unknown:'var(--unknown)'};
const SEXLET={Male:'M',Female:'F',Unknown:'U'};
const GEN=['','Founder','2nd','3rd','4th','5th','6th','7th','8th','9th','10th','11th','12th','13th','14th','15th','16th','17th','18th','19th','20th','21st'];
const $=id=>document.getElementById(id);
const svg=$('svg'), canvas=$('canvas'), panel=$('panel');
const APP_VERSION='1.0.2';
{ const e=$('appVer'); if(e) e.textContent='v'+APP_VERSION; }

/* ---------- helpers ---------- */
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function yrs(n){ if(n.birth&&n.death)return n.birth+'–'+n.death; if(n.birth)return 'b '+n.birth; if(n.death)return 'd '+n.death; return ''; }
function ancestors(id){ const a=[]; let n=byId.get(id); while(n&&n.parent!=null){a.push(n.parent);n=byId.get(n.parent);} return a; }
function descendants(id){ const out=new Set(),st=[id]; while(st.length){const x=st.pop(); (kids.get(x)||[]).forEach(c=>{if(!out.has(c)){out.add(c);st.push(c);}});} return out; }
function maxId(){ return nodes.reduce((m,n)=>Math.max(m,n.id),-1); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
const _mc=document.createElement('canvas').getContext('2d');
const SANS=(getComputedStyle(document.body).fontFamily)||'system-ui,sans-serif';
const FONT_LBL='12.5px '+SANS, FONT_YR='10.5px '+SANS;
function tw(str,font){ _mc.font=font; return _mc.measureText(str).width; }
function fitLabel(str,maxW){ if(tw(str,FONT_LBL)<=maxW)return str; let t=str; while(t.length>1 && tw(t+'…',FONT_LBL)>maxW)t=t.slice(0,-1); return t.replace(/\s+$/,'')+'…'; }

/* ---------- ingest / rebuild ---------- */
function ingest(arr){ nodes=arr.map(n=>({id:Number(n.id),ref:n.ref??null,name:n.name||'(unknown)',birth:n.birth??null,death:n.death??null,sex:n.sex||'Unknown',aka:n.aka??null,note:n.note??null,parent:(n.parent===undefined?null:n.parent),recordedChildren:n.recordedChildren??null})); rebuild(); }
function rebuild(){
  byId=new Map(); kids=new Map(); depth=new Map(); ROOT=null;
  nodes.forEach(n=>byId.set(n.id,n));
  nodes.forEach(n=>{ if(n.parent==null){ if(ROOT==null)ROOT=n.id; } else { if(!kids.has(n.parent))kids.set(n.parent,[]); kids.get(n.parent).push(n.id);} });
  function dof(id,guard){ if(depth.has(id))return depth.get(id); const n=byId.get(id); if(!n||n.parent==null||!byId.has(n.parent)||(guard&&guard.has(id))){depth.set(id,0);return 0;} const g=guard||new Set(); g.add(id); const d=dof(n.parent,g)+1; depth.set(id,d); return d; }
  nodes.forEach(n=>dof(n.id));
  kids.forEach(a=>a.sort((x,y)=>x-y));
  $('cTot').textContent=nodes.length;
  $('cGen').textContent=(Math.max(0,...[...depth.values()])+1);
  if(firstLoad){ expanded=new Set(); nodes.forEach(n=>{ if((depth.get(n.id)||0)<=6 && kids.get(n.id)) expanded.add(n.id); }); firstLoad=false; }
}

/* ---------- layout + render ---------- */
let LAYOUT={}, BBOX={w:0,h:0}, maxDepthVisible=0;
function computeLayout(){
  LAYOUT={}; let leaf=0; maxDepthVisible=0;
  function walk(id){ const d=depth.get(id)||0; if(d>maxDepthVisible)maxDepthVisible=d;
    const ch=kids.get(id); const open=expanded.has(id)&&ch&&ch.length; let y;
    if(open){ const ys=ch.map(walk); y=(ys[0]+ys[ys.length-1])/2; } else { y=PADY+leaf*ROWH; leaf++; }
    LAYOUT[id]={x:PADX+d*COLX,y,open:!!open}; return y; }
  if(ROOT==null){ BBOX={w:300,h:200}; return; }
  walk(ROOT);
  BBOX.w=PADX+(maxDepthVisible+1)*COLX+140; BBOX.h=PADY*2+leaf*ROWH;
}
function render(){
  computeLayout();
  const selPath = selected!=null ? new Set([selected,...ancestors(selected)]) : new Set();
  let s='';
  for(let d=0; d<=maxDepthVisible; d++){ const x=PADX+d*COLX;
    s+=`<line class="gline" x1="${x}" y1="${PADY-14}" x2="${x}" y2="${BBOX.h-PADY+10}"/>`;
    s+=`<text class="gnum" x="${x}" y="${PADY-20}">${GEN[d+1]||((d+1)+'th')}</text>`; }
  const vis=Object.keys(LAYOUT).map(Number);
  for(const i of vis){ const ch=kids.get(i); if(!LAYOUT[i].open||!ch)continue; const p=LAYOUT[i];
    for(const c of ch){ if(!LAYOUT[c])continue; const qq=LAYOUT[c]; const hi=selPath.has(i)&&selPath.has(c);
      const x1=p.x+MK,x2=qq.x-MK,mx=(x1+x2)/2;
      s+=`<path class="edge${hi?' hi':''}" d="M${x1},${p.y} C${mx},${p.y} ${mx},${qq.y} ${x2},${qq.y}"/>`; } }
  for(const i of vis){ const n=byId.get(i),L=LAYOUT[i],ch=kids.get(i); const col=SEXCOL[n.sex]||SEXCOL.Unknown; const hasCh=ch&&ch.length;
    s+=`<g class="node${selected===i?' sel':''}" data-i="${i}">`;
    if(hasCh){ const fill=L.open?'var(--paper)':col; s+=`<rect class="mk toggle" data-i="${i}" x="${L.x-MK}" y="${L.y-MK}" width="${MK*2}" height="${MK*2}" rx="1.2" fill="${fill}" stroke="${col}"/>`; }
    else { s+=`<circle class="mk" cx="${L.x}" cy="${L.y}" r="${MK-0.6}" fill="${col}" stroke="${col}"/>`; }
    const yr=yrs(n); const tx=L.x+LBLDX; const ly=L.y-8;
    const yw = yr ? tw(yr,FONT_YR)+8 : 0;
    const disp = fitLabel(n.name, Math.max(48, MAXLBLW - yw));
    const nameW = tw(disp,FONT_LBL);
    const tip = esc(n.name)+(yr?(' · '+yr):'');
    s+=`<text class="lbl" x="${tx}" y="${ly}" data-sel="${i}"><title>${tip}</title>${esc(disp)}</text>`;
    let ox=tx+nameW+8;
    if(yr){ s+=`<text class="yr" x="${ox}" y="${ly}">${yr}</text>`; ox+=tw(yr,FONT_YR)+8; }
    if(hasCh&&!L.open){ s+=`<text class="badge toggle" data-i="${i}" x="${ox}" y="${ly}">+${ch.length}</text>`; }
    s+=`</g>`; }
  svg.setAttribute('viewBox',`0 0 ${BBOX.w} ${BBOX.h}`);
  svg.setAttribute('width',BBOX.w*scale); svg.setAttribute('height',BBOX.h*scale);
  svg.innerHTML=s;
}

/* ---------- selection + panel ---------- */
svg.addEventListener('click',e=>{
  const tog=e.target.closest('.toggle');
  if(tog){ const i=+tog.dataset.i; expanded.has(i)?expanded.delete(i):expanded.add(i); render(); return; }
  const lbl=e.target.closest('[data-sel]'); if(lbl) select(+lbl.dataset.sel,false);
});
function centerOn(i){ const L=LAYOUT[i]; if(!L)return; canvas.scrollTo({left:L.x*scale-canvas.clientWidth/2,top:L.y*scale-canvas.clientHeight/2,behavior:'smooth'}); }
function flash(i){ render(); requestAnimationFrame(()=>{ const g=svg.querySelector(`g.node[data-i="${i}"]`); if(g){g.classList.add('flash'); setTimeout(()=>g.classList.remove('flash'),1600);} }); }
function select(id,jump){ if(!byId.has(id))return; selected=id; ancestors(id).forEach(a=>expanded.add(a)); render(); if(jump){centerOn(id);flash(id);} buildPanel(id); panel.classList.remove('hidden'); }
function refreshPanel(){ if(selected!=null && byId.has(selected)) buildPanel(selected); }

function buildPanel(id){
  const n=byId.get(id);
  const chain=[...ancestors(id)].reverse().concat(id);
  let chainHTML=chain.map((c,k)=>{ const given=(byId.get(c).name||'').split(' ')[0];
    return (c===id?`<span class="cur">${esc(given)}</span>`:`<a data-go="${c}">${esc(given)}</a>`)+(k<chain.length-1?'<span class="sep"> › </span>':''); }).join('');
  const myKids=(kids.get(id)||[]).map(c=>{ const k=byId.get(c); const kc=(kids.get(c)||[]).length;
    return `<div class="kid" data-go="${c}"><span>${esc(k.name)}</span>${kc?`<span class="kc">${kc} ch.</span>`:''}</div>`; }).join('') || '<div class="emptystate" style="padding:6px 0">No recorded children.</div>';
  let facts=''; const addf=(l,v)=>{ if(v!=null&&v!=='') facts+=`<div class="fact"><span class="l">${l}</span><span class="v">${esc(v)}</span></div>`; };
  addf('Reference', n.ref!=null?('#'+n.ref):'—');
  addf('Generation', GEN[(depth.get(id)||0)+1]||((depth.get(id)||0)+1));
  addf('Born', n.birth||'—'); if(n.death) addf('Died', n.death);
  addf('Sex', n.sex);
  if(n.aka) addf('Also known as', n.aka);
  const live=(kids.get(id)||[]).length;
  addf('Children', live + (n.recordedChildren!=null && n.recordedChildren!==live ? ' (recorded: '+n.recordedChildren+')' : ''));
  if(n.note) addf('Note', n.note);
  const editTools = `<div class="editrow">
      <button class="btn" data-act="pdf">Export branch (PDF)</button>
      ${isEditor ? `<button class="btn primary" data-act="edit">Edit</button>
      <button class="btn" data-act="addchild">Add child</button>
      ${live? '' : '<button class="btn danger" data-act="delete">Delete</button>'}` : ''}
    </div>`;
  panel.innerHTML=`<button class="closep" id="pClose">×</button><div class="pad">
      <div class="ph">${esc(n.name)}</div>
      <div class="pmk"><span class="sx">${esc(n.sex)}</span> · ${GEN[(depth.get(id)||0)+1]||''} generation${yrs(n)?' · '+yrs(n):''}</div>
      ${editTools}
      <div class="sech">Lineage</div><div class="chain">${chainHTML}</div>
      <div class="facts">${facts}</div>
      <div class="sech">Children · ${live}</div><div class="kids">${myKids}</div></div>`;
  $('pClose').onclick=()=>{ panel.classList.add('hidden'); selected=null; render(); };
  panel.querySelectorAll('[data-go]').forEach(el=> el.onclick=()=> select(+el.dataset.go,true));
  panel.querySelectorAll('[data-act]').forEach(el=> el.onclick=()=>{ const a=el.dataset.act; if(a==='edit')openEdit(id,false); else if(a==='addchild')openEdit(id,true); else if(a==='delete')delNode(id); else if(a==='pdf')exportPDF(id); });
}

/* ---------- search ---------- */
const q=$('q'), results=$('results');
function doSearch(){ const v=q.value.trim().toLowerCase(); if(!v){results.classList.remove('show');return;}
  let hits=[]; for(const n of nodes){ if(n.name.toLowerCase().includes(v)||String(n.ref)===v||(''+n.ref).includes(v)||(n.aka&&n.aka.toLowerCase().includes(v))){ hits.push(n); if(hits.length>=60)break; } }
  if(!hits.length){ results.innerHTML='<div class="res empty">No match.</div>'; results.classList.add('show'); return; }
  results.innerHTML=hits.map(n=>{ const yr=yrs(n); return `<div class="res" data-go="${n.id}"><span class="gen">${GEN[(depth.get(n.id)||0)+1]||''}</span><span class="nm">${esc(n.name)}</span>${yr?` <span class="dt">${yr}</span>`:''}<div class="dt">${n.ref!=null?'#'+n.ref:''}${n.aka?' · aka '+esc(n.aka):''}</div></div>`; }).join('');
  results.classList.add('show');
  results.querySelectorAll('.res[data-go]').forEach(el=> el.onclick=()=>{ select(+el.dataset.go,true); results.classList.remove('show'); }); }
q.addEventListener('input',doSearch);
q.addEventListener('focus',()=>{ if(q.value.trim())doSearch(); });
document.addEventListener('click',e=>{ if(!e.target.closest('.searchwrap'))results.classList.remove('show'); });
q.addEventListener('keydown',e=>{ if(e.key==='Enter'){const f=results.querySelector('.res[data-go]'); if(f)f.click();} if(e.key==='Escape')results.classList.remove('show'); });

/* ---------- view buttons / zoom / pan ---------- */
$('bExpand').onclick=()=>{ nodes.forEach(n=>{ if(kids.get(n.id))expanded.add(n.id); }); render(); };
$('bCollapse').onclick=()=>{ expanded=new Set(); nodes.forEach(n=>{ if((depth.get(n.id)||0)<=6&&kids.get(n.id))expanded.add(n.id); }); render(); };
function setScale(k){ scale=Math.max(.25,Math.min(2.4,k)); svg.setAttribute('width',BBOX.w*scale); svg.setAttribute('height',BBOX.h*scale); }
$('zIn').onclick=()=>setScale(scale*1.2); $('zOut').onclick=()=>setScale(scale/1.2);
$('bFit').onclick=()=>{ const k=Math.min(canvas.clientWidth/BBOX.w,canvas.clientHeight/BBOX.h); setScale(k*0.96); canvas.scrollTo({left:0,top:0}); };
$('bPdfAll').onclick=()=>exportPDF(ROOT);
canvas.addEventListener('wheel',e=>{ if(e.ctrlKey||e.metaKey){ e.preventDefault(); const r=canvas.getBoundingClientRect(); const cx=canvas.scrollLeft+(e.clientX-r.left),cy=canvas.scrollTop+(e.clientY-r.top); const fx=cx/(BBOX.w*scale),fy=cy/(BBOX.h*scale); setScale(scale*(e.deltaY<0?1.12:1/1.12)); canvas.scrollLeft=fx*BBOX.w*scale-(e.clientX-r.left); canvas.scrollTop=fy*BBOX.h*scale-(e.clientY-r.top);} },{passive:false});
let drag=null;
canvas.addEventListener('pointerdown',e=>{ if(e.target.closest('.node'))return; drag={x:e.clientX,y:e.clientY,sl:canvas.scrollLeft,st:canvas.scrollTop}; canvas.classList.add('grabbing'); canvas.setPointerCapture(e.pointerId); });
canvas.addEventListener('pointermove',e=>{ if(!drag)return; canvas.scrollLeft=drag.sl-(e.clientX-drag.x); canvas.scrollTop=drag.st-(e.clientY-drag.y); });
canvas.addEventListener('pointerup',()=>{drag=null;canvas.classList.remove('grabbing');});
canvas.addEventListener('pointerleave',()=>{drag=null;canvas.classList.remove('grabbing');});

/* ---------- edit modal ---------- */
const scrim=$('scrim'), modal=$('modal'); let ppPick=null;
function closeModal(){ scrim.classList.remove('show'); }
scrim.addEventListener('click',e=>{ if(e.target===scrim)closeModal(); });
function openEdit(id, asChild){
  if(!isEditor){ toast('Sign in as an editor to make changes.'); return; }
  const base = asChild ? {name:'',birth:null,death:null,sex:'Male',aka:'',note:'',parent:id} : {...byId.get(id)};
  ppPick = base.parent;
  const parentName = ppPick!=null && byId.get(ppPick) ? byId.get(ppPick).name : '— none (founder) —';
  modal.innerHTML=`
    <div class="mhead">${asChild?'Add a child':'Edit person'}</div>
    <div class="mbody">
      <div class="field"><label>Full name</label><input id="f_name" value="${esc(base.name)}" placeholder="e.g. Yusuf Ahmed Issak"></div>
      <div class="row2">
        <div class="field"><label>Born</label><input id="f_birth" type="number" value="${base.birth??''}" placeholder="year"></div>
        <div class="field"><label>Died</label><input id="f_death" type="number" value="${base.death??''}" placeholder="year"></div>
        <div class="field"><label>Sex</label><select id="f_sex">
          <option ${base.sex==='Male'?'selected':''}>Male</option>
          <option ${base.sex==='Female'?'selected':''}>Female</option>
          <option ${base.sex==='Unknown'?'selected':''}>Unknown</option></select></div>
      </div>
      <div class="field"><label>Also known as</label><input id="f_aka" value="${esc(base.aka||'')}"></div>
      <div class="field"><label>Note</label><textarea id="f_note">${esc(base.note||'')}</textarea></div>
      <div class="field parentpick"><label>Parent ${asChild?'(the person you are adding under)':''}</label>
        <input id="f_parent" value="${esc(parentName)}" ${asChild?'disabled':''} placeholder="search a name…">
        <div class="ppres" id="ppres"></div></div>
    </div>
    <div class="mfoot"><span class="hint">${asChild?'Adds a new descendant.':'Changes are saved live and logged.'}</span>
      <div class="right"><button class="btn" id="mCancel">Cancel</button><button class="btn primary" id="mSave">${asChild?'Add child':'Save'}</button></div>
    </div>`;
  scrim.classList.add('show');
  $('mCancel').onclick=closeModal;
  $('mSave').onclick=()=> asChild ? saveNew(id) : saveEdit(id);
  if(!asChild){ const fp=$('f_parent'), pr=$('ppres'); const forbid=new Set([id,...descendants(id)]);
    fp.addEventListener('input',()=>{ const v=fp.value.trim().toLowerCase(); if(!v){pr.classList.remove('show');return;}
      const hh=nodes.filter(n=>!forbid.has(n.id)&&n.name.toLowerCase().includes(v)).slice(0,40);
      pr.innerHTML=`<div data-pid="">— none (make founder) —</div>`+hh.map(n=>`<div data-pid="${n.id}">${esc(n.name)}${n.birth?' · '+n.birth:''}</div>`).join('');
      pr.classList.add('show');
      pr.querySelectorAll('[data-pid]').forEach(el=> el.onclick=()=>{ ppPick=el.dataset.pid===''?null:Number(el.dataset.pid); fp.value=ppPick==null?'— none (founder) —':byId.get(ppPick).name; pr.classList.remove('show'); }); });
  }
}
function readForm(){ const num=v=>{ v=String(v).trim(); return v===''?null:(parseInt(v,10)||null); };
  return { name:$('f_name').value.trim()||'(unknown)', birth:num($('f_birth').value), death:num($('f_death').value),
           sex:$('f_sex').value, aka:$('f_aka').value.trim()||null, note:$('f_note').value.trim()||null }; }
async function saveEdit(id){ const f=readForm(); const before={...byId.get(id)}; const after={...before,...f,parent:ppPick};
  try{ await fbWrite('update', after, before); closeModal(); toast('Saved.'); }catch(e){ toast('Save failed: '+e.message); } }
async function saveNew(parentId){ const f=readForm(); const nid=maxId()+1; const after={id:nid,ref:null,recordedChildren:0,parent:parentId,...f};
  try{ await fbWrite('insert', after, null); closeModal(); toast('Child added.'); }catch(e){ toast('Add failed: '+e.message); } }
async function delNode(id){ if((kids.get(id)||[]).length){ toast('Remove this person’s children first.'); return; }
  if(!confirm('Delete '+byId.get(id).name+'? This cannot be undone (but is kept in the change log).'))return;
  try{ await fbWrite('delete', byId.get(id), byId.get(id)); if(selected===id){selected=null;panel.classList.add('hidden');} toast('Deleted.'); }catch(e){ toast('Delete failed: '+e.message); } }

/* ---------- demo-mode local writes (no firebase) ---------- */
function demoApply(action, after){ if(action==='insert'){ nodes.push(after); } else if(action==='update'){ const n=byId.get(after.id); Object.assign(n,after); } else if(action==='delete'){ nodes=nodes.filter(n=>n.id!==after.id); } ingest(nodes); render(); refreshPanel(); }

/* ---------- firebase write router ---------- */
async function fbWrite(action, after, before){
  if(MODE!=='live'){ demoApply(action, after); return; }
  const {doc,collection,writeBatch,serverTimestamp,deleteDoc}=FB.fs;
  const clean=o=>{ const c={}; for(const k in o){ c[k]= o[k]===undefined?null:o[k]; } return c; };
  const ref=doc(db,'people',String(after.id));
  const batch=writeBatch(db);
  if(action==='delete'){ batch.delete(ref); }
  else { batch.set(ref, {...clean(after), updatedAt:serverTimestamp(), updatedBy:user.email}); }
  batch.set(doc(collection(db,'edits')), { personId:after.id, action, by:user.email, at:serverTimestamp(),
            before:before?clean(before):null, after:action==='delete'?null:clean(after) });
  await batch.commit();
}

/* ---------- auth UI ---------- */
function renderAuth(){
  const bar=$('authbar');
  if(MODE!=='live'){ bar.innerHTML='<span>Preview mode · not connected</span>'; return; }
  if(!user){ bar.innerHTML='<button class="btn" id="bSignIn">Sign in to edit</button>'; $('bSignIn').onclick=signIn; return; }
  if(isEditor){ bar.innerHTML=`<span class="ok">✓ ${esc(user.email)}</span> <button class="btn" id="bBackup">Backup</button> <button class="btn" id="bRestore">Restore</button> <button class="btn" id="bOut">Sign out</button>`;
    $('bOut').onclick=signOutNow; $('bBackup').onclick=backup; $('bRestore').onclick=startRestore; }
  else { bar.innerHTML=`<span class="warn">${esc(user.email)} — view only</span> <button class="btn" id="bOut">Sign out</button>`; $('bOut').onclick=signOutNow; }
}
async function signIn(){ try{ await FB.auth.signInWithPopup(auth, new FB.auth.GoogleAuthProvider()); }catch(e){ toast('Sign-in failed: '+e.message); } }
async function signOutNow(){ await FB.auth.signOut(auth); }


/* ---------- backup / restore ---------- */
function backup(){
  if(!nodes.length){ toast('Nothing to back up.'); return; }
  const payload={ app:'karatela-tree', version:APP_VERSION, exportedAt:new Date().toISOString(), count:nodes.length,
    people: nodes.map(n=>({id:n.id,ref:n.ref,name:n.name,birth:n.birth,death:n.death,sex:n.sex,aka:n.aka,note:n.note,parent:n.parent,recordedChildren:n.recordedChildren})) };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='karatela_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast('Backup downloaded ('+nodes.length+' records).');
}
function startRestore(){ if(!isEditor){ toast('Sign in as an editor first.'); return; } const f=$('restoreFile'); f.value=''; f.click(); }
$('restoreFile').addEventListener('change', async e=>{
  const file=e.target.files && e.target.files[0]; if(!file) return;
  let parsed; try{ parsed=JSON.parse(await file.text()); }catch(err){ toast('That file is not valid JSON.'); return; }
  const people = Array.isArray(parsed) ? parsed : (parsed.people||[]);
  if(!people.length || !people.some(p=>p.parent==null || p.parent===undefined)){ toast('Backup looks empty or has no root — aborting.'); return; }
  const recs = people.map(p=>({ id:Number(p.id), ref:p.ref??null, name:p.name||'(unknown)', birth:p.birth??null, death:p.death??null,
    sex:p.sex||'Unknown', aka:p.aka??null, note:p.note??null, parent:(p.parent==null?null:Number(p.parent)), recordedChildren:p.recordedChildren??null }));
  const backupIds=new Set(recs.map(r=>r.id));
  const toDelete=nodes.map(n=>n.id).filter(id=>!backupIds.has(id));
  if(!confirm('Restore will make the live database match this backup.\n\n• '+recs.length+' record(s) will be written (overwriting current values).\n• '+toDelete.length+' record(s) not in the backup will be DELETED.\n\nThis cannot be undone. Continue?')) return;
  try{
    toast('Restoring…');
    const {doc,collection,writeBatch,serverTimestamp,setDoc}=FB.fs;
    const ops=[...recs.map(r=>({t:'set',r})), ...toDelete.map(id=>({t:'del',id}))];
    for(let i=0;i<ops.length;i+=400){ const batch=writeBatch(db);
      for(const op of ops.slice(i,i+400)){
        if(op.t==='set') batch.set(doc(db,'people',String(op.r.id)), {...op.r, updatedAt:serverTimestamp(), updatedBy:user.email});
        else batch.delete(doc(db,'people',String(op.id)));
      }
      await batch.commit(); toast('Restoring… '+Math.min(i+400,ops.length)+'/'+ops.length);
    }
    try{ await setDoc(doc(collection(db,'edits')), { action:'restore', by:user.email, at:serverTimestamp(), written:recs.length, deleted:toDelete.length }); }catch(_){}
    toast('Restore complete ('+recs.length+' records).');
  }catch(err){ toast('Restore failed: '+err.message); }
});

/* ---------- PDF export (vector, via jsPDF + svg2pdf, loaded on demand) ---------- */
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=()=>res(); s.onerror=()=>rej(new Error('failed to load '+src)); document.head.appendChild(s); }); }
async function loadFirst(urls){ let last; for(const u of urls){ try{ await loadScript(u); return; }catch(e){ last=e; } } throw last; }
let _pdfReady=null;
function ensurePdfLibs(){ if(_pdfReady) return _pdfReady;
  _pdfReady=(async()=>{
    await loadFirst([
      'https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js',
      'https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'
    ]);
    if(!window.jspdf || !window.jspdf.jsPDF) throw new Error('jsPDF failed to load');
    await loadFirst([
      'https://cdn.jsdelivr.net/npm/svg2pdf.js@2.7.0/dist/svg2pdf.umd.min.js',
      'https://unpkg.com/svg2pdf.js@2.7.0/dist/svg2pdf.umd.min.js'
    ]);
  })().catch(err=>{ _pdfReady=null; throw err; });
  return _pdfReady;
}
const FONT_EXP='12px Helvetica, Arial, sans-serif';
function buildExportSVG(rootId){
  const incl=[rootId, ...descendants(rootId)].filter(id=>byId.has(id));
  const rd=new Map();
  function rdepth(id){ if(rd.has(id))return rd.get(id); if(id===rootId){ rd.set(id,0); return 0; } const p=byId.get(id).parent; const d=(p!=null&&byId.has(p))?rdepth(p)+1:0; rd.set(id,d); return d; }
  incl.forEach(rdepth);
  let maxName=90; incl.forEach(id=>{ const w=tw(byId.get(id).name,FONT_EXP); if(w>maxName)maxName=w; });
  const C=Math.ceil(maxName+96), R=18, padX=44, padTop=84, padBot=40, mk=3.6, lbldx=11;
  const pos={}; let leaf=0, maxD=0;
  function walk(id){ const d=rd.get(id); if(d>maxD)maxD=d;
    const ch=(kids.get(id)||[]).filter(c=>byId.has(c)).sort((a,b)=>a-b);
    let y; if(ch.length){ const ys=ch.map(walk); y=(ys[0]+ys[ys.length-1])/2; } else { y=leaf*R; leaf++; }
    pos[id]={x:padX+d*C, y:padTop+y}; return y; }
  walk(rootId);
  const W=padX*2+(maxD+1)*C, H=padTop+padBot+Math.max(1,leaf)*R;
  const SEX={Male:'#C8402F',Female:'#2F7D4E',Unknown:'#2E5E8C'};
  const baseGen=(depth.get(rootId)||0);
  const rootName=byId.get(rootId).name;
  let s=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  s+=`<rect x="0" y="0" width="${W}" height="${H}" fill="#FDFBF6"/>`;
  s+=`<text x="${padX}" y="40" font-family="Helvetica" font-size="24" font-weight="bold" fill="#2B2622">Descendants of ${esc(rootName)}</text>`;
  s+=`<text x="${padX}" y="61" font-family="Helvetica" font-size="12" fill="#6E6353">Karatela family tree  ·  ${incl.length} individuals  ·  generated ${new Date().toISOString().slice(0,10)}  ·  app v${APP_VERSION}</text>`;
  for(let d=0; d<=maxD; d++){ const x=padX+d*C; const g=GEN[baseGen+d+1]||((baseGen+d+1)+'th');
    s+=`<line x1="${x}" y1="${padTop-8}" x2="${x}" y2="${H-padBot+6}" stroke="#E7DFCB" stroke-width="1" stroke-dasharray="2 6"/>`;
    s+=`<text x="${x}" y="${padTop-14}" font-family="Helvetica" font-size="10" fill="#A8762B">${esc(g)}</text>`; }
  incl.forEach(id=>{ const p=pos[id]; (kids.get(id)||[]).filter(c=>byId.has(c)).forEach(c=>{ const q=pos[c];
    const x1=p.x+mk,x2=q.x-mk,mx=(x1+x2)/2;
    s+=`<path d="M${x1},${p.y} C${mx},${p.y} ${mx},${q.y} ${x2},${q.y}" fill="none" stroke="#C0B49A" stroke-width="1"/>`; }); });
  incl.forEach(id=>{ const n=byId.get(id), p=pos[id], col=SEX[n.sex]||SEX.Unknown;
    const tx=p.x+lbldx, ty=p.y+4;
    const nameW=tw(n.name,FONT_EXP), yr=yrs(n), yrW=yr?8+tw(yr,'10px Helvetica, Arial, sans-serif'):0;
    s+=`<rect x="${tx-4}" y="${p.y-8}" width="${nameW+yrW+8}" height="16" fill="#FDFBF6"/>`;
    s+=`<circle cx="${p.x}" cy="${p.y}" r="${mk}" fill="${col}" stroke="${col}"/>`;
    s+=`<text x="${tx}" y="${ty}" font-family="Helvetica" font-size="12" fill="#2B2622">${esc(n.name)}</text>`;
    if(yr){ const nx=tx+nameW+8; s+=`<text x="${nx}" y="${ty}" font-family="Helvetica" font-size="10" fill="#6E6353">${esc(yr)}</text>`; } });
  s+=`</svg>`;
  return { svg:s, W, H, title:'Karatela_'+rootName.replace(/[^A-Za-z0-9]+/g,'_') };
}
async function exportPDF(rootId){
  if(rootId==null || !byId.has(rootId)){ toast('Nothing to export.'); return; }
  const count=1+descendants(rootId).size;
  if(count>1200 && !confirm('This will export '+count+' people as one large PDF and may take a little while. Continue?')) return;
  try{
    toast('Preparing PDF…');
    await ensurePdfLibs();
    const {svg,W,H,title}=buildExportSVG(rootId);
    const holder=document.createElement('div'); holder.style.cssText='position:fixed;left:-99999px;top:0';
    holder.innerHTML=svg; document.body.appendChild(holder);
    const el=holder.querySelector('svg');
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF({ orientation:(W>=H?'landscape':'portrait'), unit:'pt', format:[W,H], compress:true });
    if(typeof pdf.svg!=='function') throw new Error('svg2pdf did not attach');
    await pdf.svg(el,{ x:0, y:0, width:W, height:H });
    pdf.save(title+'.pdf');
    holder.remove();
    toast('PDF saved.');
  }catch(e){ toast('PDF failed: '+((e&&e.message)||e)); }
}


/* ---------- boot ---------- */
function bannerMsg(html){ const b=$('banner'); b.style.display='block'; b.innerHTML=html; }
async function boot(){
  const configured = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith('PASTE');
  if(!configured){
    MODE='demo'; ingest([]); render(); renderAuth();
    bannerMsg('<b>Not connected.</b> Add your Firebase config to load the family tree.');
    return;
  }
  try{
    const app  = await import(`https://www.gstatic.com/firebasejs/${FBVER}/firebase-app.js`);
    const fs   = await import(`https://www.gstatic.com/firebasejs/${FBVER}/firebase-firestore.js`);
    const au   = await import(`https://www.gstatic.com/firebasejs/${FBVER}/firebase-auth.js`);
    FB={fs,auth:au};
    const fbApp=app.initializeApp(FIREBASE_CONFIG);
    db=fs.getFirestore(fbApp); auth=au.getAuth(fbApp); MODE='live';
    au.onAuthStateChanged(auth, async u=>{ user=u; isEditor=false;
      if(u){ try{ const snap=await fs.getDoc(fs.doc(db,'editors',u.email)); isEditor=snap.exists(); }catch(e){} }
      renderAuth(); refreshPanel(); });
    fs.onSnapshot(fs.collection(db,'people'), snap=>{
      const arr=snap.docs.map(d=>({id:Number(d.id),...d.data()}));
      if(!arr.length){ ingest([]); MODE='live'; render(); refreshPanel();
        bannerMsg('<b>No records found</b> in the database.');
        return; }
      $('banner').style.display='none'; ingest(arr); render(); refreshPanel();
    }, err=>{ toast('Read error: '+err.message); });
    renderAuth();
  }catch(e){ MODE='demo'; ingest([]); render(); renderAuth();
    bannerMsg('<b>Could not reach Firebase</b> ('+esc(e.message)+'). Please retry shortly.'); }
}
boot();
